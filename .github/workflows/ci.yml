name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Check workspace structure
        run: bash scripts/check-workspace.sh
      - name: Cargo check workspace
        run: cargo check --workspace
      - name: Verify tuner-dsp native-audio
        run: cargo test -p tuner-dsp --features native-audio
      - name: Verify tuner-dsp web-audio build
        run: cargo check -p tuner-dsp --no-default-features --features web-audio
