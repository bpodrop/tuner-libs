name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check workspace structure
        run: bash scripts/check-workspace.sh
      - name: Check legacy naming guard
        run: bash scripts/check-no-legacy-names.sh
      - name: Check formatting
        run: cargo fmt --check
      - name: Lint workspace
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test workspace
        run: cargo test --workspace
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - name: Verify tuner-web-bridge wasm package build
        run: wasm-pack build web-bridge --target web
